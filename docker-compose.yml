services:
  plex-partial-scan:
    image: alpine:latest
    container_name: plex-partial-scan
    restart: unless-stopped
    volumes:
      - type: bind
        source: /mnt
        target: /mnt
        read_only: true
        bind:
          propagation: rslave
      - ./watch.sh:/watch.sh:ro
      - ./plex-scan.conf:/config/plex-scan.conf:ro
    command: |
      sh -c "apk add --no-cache curl && /watch.sh"
networks: {}
